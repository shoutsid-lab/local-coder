model: openai/local-coder
edit-format: whole

openai-api-base: http://127.0.0.1:8080/v1
openai-api-key: local-no-key

show-model-warnings: false
gitignore: false

map-tokens: 2048
max-chat-history-tokens: 8192

auto-commits: false
dirty-commits: false

auto-lint: false
auto-test: true
test-cmd: make verify

read:
  - CONVENTIONS.md
  - TASK.md
